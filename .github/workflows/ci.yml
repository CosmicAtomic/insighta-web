name: CI
on:
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files exist
        run: |
          test -f index.html
          test -f dashboard.html
          test -f profiles.html
          test -f profile.html
          test -f search.html
          test -f account.html
          echo "All pages present"